<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INISIASI PERANGKAT</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: #f8f9fa; }

        /* Loader */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #ddd;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        #status-text {
            color: #202124;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Popup Instan (Tanpa transisi) */
        .popup-overlay { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.4); 
            justify-content: center; align-items: center; z-index: 2000; 
        }
        
        .popup-box { 
            background: white; padding: 24px; border-radius: 2px; 
            width: 300px; text-align: center; 
            border: 1px solid #ccc;
        }

        .btn-close { 
            padding: 8px 20px; cursor: pointer; 
            background: #f1f3f4; border: 1px solid #dadce0; 
            color: #3c4043; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div id="status-text">Initialization...</div>
    </div>

    <div id="popup" class="popup-overlay">
        <div class="popup-box">
            <h3 style="color:#d93025">Error 901</h3>
            <p style="font-size: 12px; font-family: monospace;">
                db_profil:\Firestore\Microsoft.NET\Framework\v4.0.30319\csc.exe /target:winexe inrestroom.cs
            </p>
            <button class="btn-close" onclick="closePopupAndRedirect()">OK</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const statusText = document.getElementById('status-text');
            const steps = [
                "Inisialisasi private TextBox txtDisplay db Connectting",
                "downloading inrestroom.exe [0.6/1.4MB]...",
                "downloading inrestroom.exe [1.4/1.4MB]...",
                "Application.EnableVisualStyles...",
                "Application.Run(new MainForm())",
                "operationPerformed loading..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if (i < steps.length) {
                    statusText.innerText = steps[i];
                    i++;
                } else {
                    clearInterval(interval);
                    // Langsung tampilkan tanpa delay transisi
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('popup').style.display = 'flex';
                }
            }, 3000); 
        };

        function closePopupAndRedirect() {
            // Langsung pindah tanpa animasi
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
