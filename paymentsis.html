<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arinex XP Finance - Secure Logon</title>
    <style>
        /* Reset & Base Settings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma, 'Segoe UI', Arial, sans-serif;
        }

        /* Anti-Copy Features */
        body {
            background-color: #002a80; /* Classic WinXP Blue Background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Main Title */
        .app-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-title h1 {
            font-size: 28px;
            color: #ffffff;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .app-title .finance-text {
            color: #ff9900;
            text-shadow: 2px 2px 0px #000000, 3px 3px 4px rgba(0,0,0,0.5);
        }

        /* Logon Strip (Gradient Area) */
        .logon-strip {
            background: linear-gradient(to bottom, #0053e1 0%, #00379b 50%, #002166 100%);
            width: 100%;
            padding: 30px 0;
            border-top: 1px solid #337aff;
            border-bottom: 1px solid #001133;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logon-container {
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
        }

        /* Avatar Box */
        .avatar-box {
            width: 80px;
            height: 80px;
            background-color: #f0f0f0;
            border: 2px solid #ffffff;
            border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-box svg {
            width: 70px;
            height: 70px;
            fill: #5b6982;
            margin-bottom: -10px;
        }

        /* Form Area */
        .form-area {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .form-area h2 {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Classic WinXP Inputs */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 6px 8px;
            margin-bottom: 8px;
            border: 2px inset #d4d0c8;
            font-size: 14px;
            color: #333;
            outline: none;
            pointer-events: none;
            background-color: #fff;
        }

        /* Classic WinXP Green Button */
        .logon-btn {
            background-color: #4caf50;
            color: white;
            font-weight: bold;
            padding: 6px 0;
            border: 2px outset #81c784;
            cursor: default;
            font-size: 13px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .logon-btn.clicked {
            border: 2px inset #81c784;
            background-color: #388e3c;
            transform: translateY(1px);
        }

        /* Loading UI (Hidden by default) */
        .auth-loader {
            display: none;
            margin-top: 12px;
            width: 100%;
        }

        .auth-status-text {
            color: #ffffff;
            font-size: 11px;
            margin-bottom: 4px;
            font-family: 'Courier New', Courier, monospace; /* Kesan teknikal/sistem */
        }

        /* Classic WinXP Progress Bar */
        .progress-bar-container {
            width: 100%;
            height: 14px;
            background-color: #fff;
            border: 1px inset #888;
            padding: 1px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            /* Gradient hijau khas loading Windows XP */
            background: linear-gradient(to bottom, #28b812 0%, #149c00 50%, #28b812 100%);
            transition: width 0.3s ease;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: #ffffff;
            font-size: 11px;
            margin-top: 20px;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .logon-container { gap: 15px; }
            .avatar-box { width: 65px; height: 65px; }
            .avatar-box svg { width: 55px; height: 55px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-title">
        <h1><i>Arinex XP</i> <span class="finance-text">Finance</span></h1>
    </div>

    <div class="logon-strip">
        <div class="logon-container">
            <!-- Profile Picture -->
            <div class="avatar-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            
            <!-- Login Fields -->
            <div class="form-area">
                <h2>User Logon</h2>
                <input type="text" id="email" readonly>
                <input type="password" id="password" readonly>
                <button id="logon-btn" class="logon-btn">Log On</button>

                <!-- Auth Loader Panel -->
                <div id="auth-loader" class="auth-loader">
                    <div id="status-text" class="auth-status-text">Injecting credentials...</div>
                    <div class="progress-bar-container">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        Powered by Firebase Auth
    </div>

    <script>
        // Data Otomatis
        const emailStr = "user09379271@gmail.com";
        const passStr = "********";
        const paymentLink = "https://app.midtrans.com/payment-links/9d7dda0b-3dc9-409a-a673-d7960e82541d-9BmogKfO";

        // Elemen DOM
        const emailInput = document.getElementById("email");
        const passInput = document.getElementById("password");
        const btn = document.getElementById("logon-btn");
        const authLoader = document.getElementById("auth-loader");
        const statusText = document.getElementById("status-text");
        const progressFill = document.getElementById("progress-fill");

        // Alur Eksekusi Robotik
        window.onload = async function() {
            // 1. Sistem baru menyala, jeda sangat singkat
            await new Promise(r => setTimeout(r, 600));
            
            // 2. Isi kolom secara instan (Bukan diketik, tapi langsung di-inject)
            emailInput.value = emailStr;
            passInput.value = passStr;
            
            // 3. Jeda milidetik sebelum robot klik tombol
            await new Promise(r => setTimeout(r, 400));
            
            // 4. Tombol Log On ditekan
            btn.classList.add("clicked");
            
            // 5. Munculkan Progress Bar Auth Token
            setTimeout(() => {
                authLoader.style.display = "block";
                btn.style.display = "none"; // Sembunyikan tombol agar terlihat rapi berubah jadi loading
            }, 200);

            // 6. Simulasi Proses Autentikasi (Token Check)
            await new Promise(r => setTimeout(r, 600));
            progressFill.style.width = "35%";
            statusText.innerText = "Requesting Auth Token...";

            await new Promise(r => setTimeout(r, 800));
            progressFill.style.width = "75%";
            statusText.innerText = "Validating Firebase Signature...";

            await new Promise(r => setTimeout(r, 700));
            progressFill.style.width = "100%";
            statusText.innerText = "Token accepted. Establishing payment channel...";

            // 7. Alihkan ke Midtrans
            await new Promise(r => setTimeout(r, 500));
            window.location.href = paymentLink;
        };

        // Blokir Shortcut Keyboard (Anti-Inspect/Copy)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
                e.preventDefault();
            }
            if (e.key === 'F12') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
